<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ally — Campus Navigation Guide</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  background: #07070a; color: #e0e0e0; height: 100vh; overflow: hidden;
  user-select: none; -webkit-user-select: none;
}
.app {
  display: flex; flex-direction: column; height: 100vh; max-width: 1400px; margin: 0 auto;
}

/* ---- HEADER ---- */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; background: linear-gradient(135deg, #12121e 0%, #1a1a2e 100%);
  border-bottom: 1px solid rgba(108,140,255,0.15); flex-shrink: 0; position: relative; z-index: 10;
}
header h1 {
  font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
  background: linear-gradient(135deg, #fff 0%, #a0b4ff 100%); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
}
.status-bar { display: flex; gap: 6px; align-items: center; }
.badge {
  padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 600;
  letter-spacing: 0.3px; display: flex; align-items: center; gap: 4px;
}
.badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.badge-green { background: rgba(74,222,128,0.12); color: #4ade80; }
.badge-green::before { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.5); }
.badge-red { background: rgba(248,113,113,0.12); color: #f87171; }
.badge-red::before { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.5); }
.badge-yellow { background: rgba(251,191,36,0.12); color: #fbbf24; }
.badge-yellow::before { background: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.5); }
.badge-blue { background: rgba(96,165,250,0.12); color: #60a5fa; }
.badge-blue::before { background: #60a5fa; box-shadow: 0 0 6px rgba(96,165,250,0.5); }
.detection-badge { color: #555; font-size: 11px; font-weight: 500; min-width: 28px; text-align: center; }
.settings-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  color: #666; border-radius: 8px; padding: 5px 9px; font-size: 15px;
  cursor: pointer; line-height: 1; transition: all 0.2s;
}
.settings-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); }

/* ---- SETTINGS PANEL ---- */
.settings-panel {
  display: none; position: absolute; top: calc(100% + 6px); right: 0; z-index: 200;
  background: rgba(26,26,40,0.96); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px; padding: 18px; width: 330px;
  box-shadow: 0 16px 64px rgba(0,0,0,0.6); backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.settings-panel.open { display: block; }
.settings-panel h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: #fff; }
.settings-panel label { display: block; font-size: 11px; font-weight: 500; color: #888; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
.settings-panel input, .settings-panel select {
  width: 100%; padding: 9px 11px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.3); color: #e0e0e0; font-size: 13px; margin-bottom: 12px;
  outline: none; transition: border-color 0.2s;
}
.settings-panel input:focus, .settings-panel select:focus { border-color: rgba(108,140,255,0.5); }
.settings-panel .row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
.settings-panel .stat { font-size: 11px; color: #555; }
.settings-panel .btn {
  padding: 7px 18px; border-radius: 8px; border: none; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s;
}
.settings-panel .btn-primary { background: #6c8cff; color: #fff; }
.settings-panel .btn-primary:hover { background: #5a7aee; }
.settings-panel .btn-primary:disabled { opacity: 0.4; cursor: default; }
.settings-panel .btn-sm { padding: 5px 12px; font-size: 11px; }
.settings-panel .status-ok { color: #4ade80; font-size: 11px; }
.settings-panel .status-err { color: #f87171; font-size: 11px; }
.settings-panel .hint { font-size: 11px; color: #555; }

/* ---- MAIN ---- */
.main { flex: 1; overflow: hidden; position: relative; }

/* ---- VIEWS ---- */
.view {
  display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0;
}
.view.active { display: flex; flex-direction: column; }

/* ---- CAMERA VIEW ---- */
.camera-view { display: none; }
.camera-view.active { display: flex; flex-direction: column; }
.camera-section { flex: 1; display: flex; flex-direction: column; padding: 8px 12px 4px; min-height: 0; }
.video-container {
  position: relative; flex: 1; background: #000; border-radius: 12px; overflow: hidden;
  min-height: 160px; box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.4);
}
.video-container video { width: 100%; height: 100%; object-fit: contain; display: block; }
.video-container canvas {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
}
.placeholder {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  text-align: center; width: 100%; padding: 0 24px;
}
.placeholder-icon { font-size: 56px; margin-bottom: 14px; opacity: 0.5; }
.placeholder-text { color: #555; font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.placeholder-sub { color: #444; font-size: 12px; margin-bottom: 20px; }
.placeholder button {
  padding: 16px 44px; background: linear-gradient(135deg, #6c8cff 0%, #5a7aee 100%);
  color: #fff; border: none; border-radius: 14px; font-size: 18px; font-weight: 600;
  cursor: pointer; min-width: 200px; touch-action: manipulation;
  box-shadow: 0 4px 20px rgba(108,140,255,0.3); transition: all 0.2s;
}
.placeholder button:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(108,140,255,0.4); }
.placeholder button:active { transform: scale(0.97); }
.camera-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 8px;
  margin-top: 5px; font-size: 11px; flex-shrink: 0;
}
.camera-footer .stat-group { display: flex; gap: 12px; }
.camera-footer .stat-item { display: flex; align-items: center; gap: 4px; color: #555; }
.camera-footer .stat-item .dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }
.camera-footer .stat-item .dot.on { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.4); }
.camera-footer .stat-item .dot.off { background: #444; }

/* ---- MAP VIEW ---- */
.map-view { display: none; }
.map-view.active { display: flex; flex-direction: column; }
.map-container { flex: 1; position: relative; background: #111; }
#map { width: 100%; height: 100%; }
.map-overlay {
  position: absolute; top: 12px; left: 12px; z-index: 1000;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
  border-radius: 10px; padding: 10px 14px; font-size: 12px; color: #ccc;
  pointer-events: none; max-width: 70%;
}
.map-overlay .name { color: #fff; font-weight: 600; }
.map-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 10px; background: rgba(255,255,255,0.03); border-radius: 8px;
  margin: 0 12px 4px; font-size: 11px; color: #555; flex-shrink: 0;
}

/* ---- HISTORY VIEW ---- */
.history-view { display: none; }
.history-view.active { display: flex; flex-direction: column; }
.history-list {
  flex: 1; overflow-y: auto; padding: 12px 16px; -webkit-overflow-scrolling: touch;
}
.history-entry {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
}
.history-entry .time {
  font-size: 10px; color: #444; margin-bottom: 6px;
}
.history-entry .q {
  color: #8ca4ff; font-weight: 500; font-size: 13px; margin-bottom: 4px;
}
.history-entry .a {
  color: #b0b0c0; font-size: 13px; line-height: 1.5;
}
.history-empty {
  display: flex; align-items: center; justify-content: center; height: 100%;
  color: #444; font-size: 14px; text-align: center; padding: 40px;
}
.history-footer {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 12px; background: rgba(255,255,255,0.03); border-radius: 8px;
  margin: 0 12px 4px; font-size: 11px; color: #555; flex-shrink: 0;
}
.history-footer button {
  background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  padding: 4px 12px; color: #666; font-size: 11px; cursor: pointer;
}
.history-footer button:hover { color: #f87171; border-color: rgba(248,113,113,0.3); }

/* ---- BOTTOM BAR ---- */
.bottom-bar {
  display: flex; align-items: center; justify-content: space-around;
  background: linear-gradient(0deg, #12121e 0%, #1a1a2e 100%);
  border-top: 1px solid rgba(108,140,255,0.12); padding: 6px 0 env(safe-area-inset-bottom);
  flex-shrink: 0; z-index: 10;
}
.tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  background: none; border: none; color: #555; font-size: 10px; font-weight: 500;
  cursor: pointer; padding: 6px 16px; transition: color 0.2s; touch-action: manipulation;
}
.tab-btn svg { width: 22px; height: 22px; fill: #555; transition: fill 0.2s; }
.tab-btn.active { color: #8ca4ff; }
.tab-btn.active svg { fill: #8ca4ff; }
.tab-btn:active { transform: scale(0.92); }

.tab-mic-btn {
  display: flex; flex-direction: column; align-items: center; background: none;
  border: none; cursor: pointer; touch-action: manipulation;
  position: relative; margin-top: -18px;
}
.tab-mic-btn .mic-ring {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, #2a2a3e 0%, #363652 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  transition: all 0.3s;
}
.tab-mic-btn .mic-ring svg { width: 26px; height: 26px; fill: #666; transition: fill 0.3s; }
.tab-mic-btn:active .mic-ring { transform: scale(0.92); }

.tab-mic-btn.listening .mic-ring { background: linear-gradient(135deg, #4a1515 0%, #5a1a1a 100%); box-shadow: 0 0 0 6px rgba(248,113,113,0.15); }
.tab-mic-btn.listening .mic-ring svg { fill: #f87171; }
.tab-mic-btn.processing .mic-ring { background: linear-gradient(135deg, #4a3510 0%, #5a4415 100%); box-shadow: 0 0 0 6px rgba(251,191,36,0.15); }
.tab-mic-btn.processing .mic-ring svg { fill: #fbbf24; }
.tab-mic-btn.speaking .mic-ring { background: linear-gradient(135deg, #0f2a1a 0%, #143a22 100%); box-shadow: 0 0 0 6px rgba(74,222,128,0.15); }
.tab-mic-btn.speaking .mic-ring svg { fill: #4ade80; }

.tab-mic-status { font-size: 10px; color: #555; margin-top: 2px; min-height: 14px; }

/* ---- RESPONSIVE ---- */
@media (max-width: 600px) {
  header { padding: 8px 12px; }
  header h1 { font-size: 16px; }
  .status-bar { gap: 5px; }
  .badge { padding: 2px 8px; font-size: 9px; }
  .settings-panel { width: calc(100vw - 24px); right: -6px; }
  .camera-section { padding: 6px 8px 2px; }
  .placeholder-icon { font-size: 44px; }
  .placeholder button { padding: 14px 32px; font-size: 16px; min-width: 160px; }
  .tab-btn { padding: 4px 10px; }
  .tab-btn svg { width: 20px; height: 20px; }
  .tab-mic-btn .mic-ring { width: 48px; height: 48px; }
  .tab-mic-btn .mic-ring svg { width: 22px; height: 22px; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Ally</h1>
    <div class="status-bar">
      <span class="badge badge-yellow" id="modelBadge">Model: --</span>
      <span class="badge badge-red" id="personBadge">Person</span>
      <span class="detection-badge" id="detectionCount">0</span>
      <button class="settings-btn" id="settingsBtn" aria-label="Settings">⚙</button>
      <div class="settings-panel" id="settingsPanel">
        <h3>Voice Settings</h3>
        <label for="apiKeyInput">ElevenLabs API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk_..." value="sk_5a7aece3d8b30d3909a939a13e3a6488abff69f0adb77f20">
        <label for="voiceSelect">Voice</label>
        <select id="voiceSelect">
          <option value="21m00Tcm4TlvDq8ikWAM">Rachel (default)</option>
          <option value="EXAVITQu4vrVxn66s0DB">Bella</option>
          <option value="ThT5KcBeYPX3keUQqPhg">Chris</option>
          <option value="TxGEqnHWrfWFTfGW9XjX">Josh</option>
          <option value="pNInz6obpgDQGcXmaG0Q">Adam</option>
          <option value="AZnzlk1XvdvUeBnXmlld">Antoni</option>
          <option value="VR6AewLTigWG4x3GB5nY">Patrick</option>
          <option value="ErXwobaYiN019PkySvjV">Antoni (British)</option>
        </select>
        <div class="row">
          <span class="stat" id="charStat">0 chars used</span>
          <button class="btn btn-sm btn-primary" id="testVoiceBtn">Test</button>
        </div>
        <div id="voiceStatus"></div>
        <div class="row">
          <button class="btn btn-primary" id="saveSettingsBtn">Save</button>
          <span class="hint">Falls back to browser TTS</span>
        </div>
      </div>
    </div>
  </header>

  <div class="main">

    <!-- CAMERA VIEW -->
    <div class="view camera-view active" id="cameraView">
      <div class="camera-section">
        <div class="video-container" id="videoContainer">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
          <div class="placeholder" id="placeholder">
            <div class="placeholder-icon">📷</div>
            <div class="placeholder-text">Camera not started</div>
            <div class="placeholder-sub">Position your phone at chest height</div>
            <button id="startCameraBtn">Start Camera</button>
          </div>
        </div>
        <div class="camera-footer">
          <div class="stat-group">
            <span class="stat-item"><span class="dot off" id="camDot"></span><span id="cameraStatus">Off</span></span>
            <span class="stat-item" id="fpsDisplay">--</span>
          </div>
          <span class="stat-item" id="objCount">0 objects</span>
        </div>
      </div>
    </div>

    <!-- MAP VIEW -->
    <div class="view map-view" id="mapView">
      <div class="map-container">
        <div id="map"></div>
        <div class="map-overlay" id="mapOverlay">
          <div class="name" id="mapLocationName">Locating...</div>
          <div id="mapCoords"></div>
        </div>
      </div>
      <div class="map-footer">
        <span id="mapAccuracy">GPS: --</span>
        <span id="mapBuildings">0 buildings nearby</span>
      </div>
    </div>

    <!-- HISTORY VIEW -->
    <div class="view history-view" id="historyView">
      <div class="history-list" id="historyList">
        <div class="history-empty" id="historyEmpty">No conversations yet.<br>Tap the mic and ask a question.</div>
      </div>
      <div class="history-footer">
        <span id="historyCount">0 conversations</span>
        <button id="clearHistoryBtn">Clear</button>
      </div>
    </div>

  </div>

  <!-- BOTTOM BAR -->
  <div class="bottom-bar">
    <button class="tab-btn active" data-tab="camera" aria-label="Camera view">
      <svg viewBox="0 0 24 24"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4z"/><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/></svg>
      <span>Camera</span>
    </button>
    <button class="tab-btn" data-tab="map" aria-label="Map view">
      <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
      <span>Map</span>
    </button>
    <button class="tab-mic-btn" id="micBtn" aria-label="Tap to speak">
      <div class="mic-ring">
        <svg viewBox="0 0 24 24">

          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>

    </button>
    <button class="tab-btn" data-tab="history" aria-label="History view">
      <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
      <span>History</span>
    </button>
  </div>
</div>

<script>
// ---- DOM refs ----
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const placeholder = document.getElementById('placeholder');
const startBtn = document.getElementById('startCameraBtn');
const modelBadge = document.getElementById('modelBadge');
const personBadge = document.getElementById('personBadge');
const detectionCount = document.getElementById('detectionCount');
const fpsDisplay = document.getElementById('fpsDisplay');
const cameraStatus = document.getElementById('cameraStatus');
const objCount = document.getElementById('objCount');
const camDot = document.getElementById('camDot');
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const apiKeyInput = document.getElementById('apiKeyInput');
const voiceSelect = document.getElementById('voiceSelect');
const charStat = document.getElementById('charStat');
const testVoiceBtn = document.getElementById('testVoiceBtn');
const voiceStatus = document.getElementById('voiceStatus');
const saveSettingsBtn = document.getElementById('saveSettingsBtn');
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const tabBtns = document.querySelectorAll('.tab-btn');
const views = document.querySelectorAll('.view');
const cameraView = document.getElementById('cameraView');
const mapView = document.getElementById('mapView');
const historyView = document.getElementById('historyView');
const historyList = document.getElementById('historyList');
const historyEmpty = document.getElementById('historyEmpty');
const historyCount = document.getElementById('historyCount');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');
const mapOverlay = document.getElementById('mapOverlay');
const mapLocationName = document.getElementById('mapLocationName');
const mapCoords = document.getElementById('mapCoords');
const mapAccuracy = document.getElementById('mapAccuracy');
const mapBuildings = document.getElementById('mapBuildings');

let mediaStream = null;
let detectionInterval = null;
let isStreaming = false;
let lastDetections = [];
let activeView = 'camera';

// ---- ElevenLabs Settings ----
let elevenLabsKey = '';
let elevenLabsVoice = '21m00Tcm4TlvDq8ikWAM';
let elevenLabsChars = 0;

function loadSettings() {
  try {
    const saved = JSON.parse(localStorage.getItem('ally_settings') || '{}');
    elevenLabsKey = saved.key || '';
    elevenLabsVoice = saved.voice || '21m00Tcm4TlvDq8ikWAM';
    elevenLabsChars = saved.chars || 0;
    apiKeyInput.value = elevenLabsKey;
    voiceSelect.value = elevenLabsVoice;
    charStat.textContent = `${elevenLabsChars} chars used`;
  } catch (e) {}
}
function saveSettings() {
  elevenLabsKey = apiKeyInput.value.trim();
  elevenLabsVoice = voiceSelect.value;
  localStorage.setItem('ally_settings', JSON.stringify({
    key: elevenLabsKey, voice: elevenLabsVoice, chars: elevenLabsChars,
  }));
  voiceStatus.textContent = 'Saved.';
  voiceStatus.className = 'status-ok';
  setTimeout(() => { voiceStatus.textContent = ''; }, 2000);
}
loadSettings();
if (apiKeyInput.value && !elevenLabsKey) saveSettings();

// ---- State machine ----
const STATE = { IDLE: 0, LISTENING: 1, PROCESSING: 2, SPEAKING: 3 };
let state = STATE.IDLE;
let abortController = null;

// ---- Tracking & Smoothing ----
let smoothedDetections = [];
const SMOOTH_ALPHA = 0.35;

const CLASS_COLORS = {
  person: '#ff4444', bicycle: '#ff8800', car: '#ffaa00', motorcycle: '#ff8800',
  bus: '#ff6600', truck: '#ff6600', bottle: '#44ccff', cup: '#44ccff',
  'wine glass': '#44ccff', chair: '#88ff44', couch: '#88ff44', bench: '#88ff44',
  'dining table': '#88ff44', 'potted plant': '#44ff88', book: '#ff44ff',
  'cell phone': '#44ffcc', laptop: '#44ffcc', tv: '#44ffcc', remote: '#44ffcc',
  keyboard: '#44ffcc', mouse: '#44ffcc', backpack: '#ff88ff', umbrella: '#ff88ff',
  handbag: '#ff88ff', suitcase: '#ff88ff', 'stop sign': '#ff3333',
  'traffic light': '#ff3333', 'fire hydrant': '#ff3333', bed: '#88aaff',
  bird: '#aaff88', cat: '#aaff88', dog: '#aaff88', horse: '#aaff88',
  bowl: '#44ccff', banana: '#ffee44', apple: '#ff4444',
  sandwich: '#ffaa44', orange: '#ff8800', carrot: '#ff8800',
  cake: '#ff88cc', donut: '#ff88cc', pizza: '#ffaa44',
};

function getClassColor(label) { return CLASS_COLORS[label] || '#44ff88'; }

function matchAndSmooth(rawDetections) {
  const matched = new Set();
  for (const nd of rawDetections) {
    const ncx = (nd.bbox[0] + nd.bbox[2]) / 2;
    const ncy = (nd.bbox[1] + nd.bbox[3]) / 2;
    let best = null; let bestDist = Infinity;
    for (const sd of smoothedDetections) {
      if (nd.label !== sd.label) continue;
      if (matched.has(sd)) continue;
      const scx = (sd.bbox[0] + sd.bbox[2]) / 2;
      const scy = (sd.bbox[1] + sd.bbox[3]) / 2;
      const d = Math.hypot(ncx - scx, ncy - scy);
      if (d < bestDist && d < 120) { bestDist = d; best = sd; }
    }
    if (best) {
      for (let i = 0; i < 4; i++) best.bbox[i] = best.bbox[i] * (1 - SMOOTH_ALPHA) + nd.bbox[i] * SMOOTH_ALPHA;
      best.confidence = nd.confidence; matched.add(best);
    } else {
      const newSd = { bbox: [...nd.bbox], confidence: nd.confidence, label: nd.label };
      smoothedDetections.push(newSd); matched.add(newSd);
    }
  }
  smoothedDetections = smoothedDetections.filter(sd => matched.has(sd));
}

// ---- Audio cues ----
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, duration, type = 'sine') {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = type;
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + duration);
  } catch (e) {}
}
function beepStart() { playTone(400, 0.15); }
function beepCaptured() { playTone(660, 0.08); setTimeout(() => playTone(880, 0.1), 100); }
function beepDone() { playTone(660, 0.1); }
function beepError() { playTone(300, 0.3, 'sawtooth'); }

// ---- Detection Loop ----
async function runDetection() {
  if (video.readyState < 2) return;
  const w = video.videoWidth; const h = video.videoHeight;
  if (w === 0 || h === 0) return;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.7));
  if (!blob) return;
  const formData = new FormData(); formData.append('file', blob, 'frame.jpg');
  const t0 = performance.now();
  try {
    const res = await fetch('/api/detect', { method: 'POST', body: formData });
    const data = await res.json();
    lastDetections = data.detections || [];
    matchAndSmooth(lastDetections);
    drawOverlay(w, h, smoothedDetections, data.person || false);
    const elapsed = (performance.now() - t0).toFixed(0);
    fpsDisplay.textContent = `${elapsed}ms`;
    detectionCount.textContent = `${smoothedDetections.length}`;
    objCount.textContent = `${smoothedDetections.length} object${smoothedDetections.length !== 1 ? 's' : ''}`;
    personBadge.textContent = data.person ? 'Person' : 'Person';
    personBadge.className = `badge ${data.person ? 'badge-red' : 'badge-green'}`;
  } catch (err) { console.error('Detection error:', err); }
}

function drawOverlay(w, h, detections, person) {
  overlay.width = w; overlay.height = h;
  const ctx = overlay.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  for (const d of detections) {
    const [x1, y1, x2, y2] = d.bbox;
    const color = getClassColor(d.label);
    ctx.strokeStyle = color; ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
    ctx.strokeRect(x1, y1, x2 - x1, y2 - y1); ctx.shadowBlur = 0;
    const label = `${d.label} ${(d.confidence * 100).toFixed(0)}%`;
    ctx.font = 'bold 13px sans-serif';
    const fm = ctx.measureText(label); const lh = 22;
    ctx.fillStyle = color; ctx.fillRect(x1, y1 - lh, fm.width + 10, lh);
    ctx.fillStyle = '#000'; ctx.fillText(label, x1 + 5, y1 - 6);
  }
}

function startDetectionLoop() {
  if (detectionInterval) clearInterval(detectionInterval);
  detectionInterval = setInterval(runDetection, 800);
  setTimeout(runDetection, 100);
  startNavigation();
}

// ---- Speech Queue ----
let speechQueue = [];
let speechActive = false;
let currentAudio = null;
let responseBuffer = '';
let spokenIndex = 0;
let streamComplete = false;

let lastNavTime = 0;
let lastNavSignature = '';

function speakText(text) {
  if (!text) return;
  speechQueue.push(text);
  processSpeechQueue();
}

function processSpeechQueue() {
  if (speechActive || speechQueue.length === 0) return;
  speechActive = true;
  const text = speechQueue.shift();
  setState(STATE.SPEAKING);
  if (elevenLabsKey) speakWithElevenLabs(text, onSpeechDone);
  else speakWithBrowser(text, onSpeechDone);
}

function onSpeechDone() {
  speechActive = false;
  if (speechQueue.length === 0) setState(STATE.IDLE);
  processSpeechQueue();
}

function speakWithBrowser(text, onDone) {
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 1.0;
  utterance.onend = onDone;
  utterance.onerror = () => { speechQueue = []; speechActive = false; setState(STATE.IDLE); };
  window.speechSynthesis.speak(utterance);
}

async function speakWithElevenLabs(text, onDone) {
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${elevenLabsVoice}/stream`, {
      method: 'POST',
      headers: { 'xi-api-key': elevenLabsKey, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text, model_id: 'eleven_turbo_v2',
        voice_settings: { stability: 0.35, similarity_boost: 0.75 },
      }),
    });
    if (!res.ok) { const e = await res.text().catch(() => ''); throw new Error(`ElevenLabs ${res.status}: ${e}`); }
    const blob = await res.blob();
    elevenLabsChars += text.length;
    charStat.textContent = `${elevenLabsChars} chars used`;
    const saved = JSON.parse(localStorage.getItem('ally_settings') || '{}');
    saved.chars = elevenLabsChars; localStorage.setItem('ally_settings', JSON.stringify(saved));
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentAudio = audio;
    audio.onended = () => { currentAudio = null; URL.revokeObjectURL(url); onDone(); };
    audio.onerror = () => { currentAudio = null; URL.revokeObjectURL(url); onDone(); };
    await audio.play();
  } catch (e) {
    console.error('ElevenLabs error:', e);
    speakWithBrowser(text, onDone);
  }
}

async function testElevenLabs() {

// ---- State Management ----
function setState(newState, statusText) {
  state = newState;
  micBtn.className = 'tab-mic-btn';
  if (state === STATE.IDLE) {
    micStatus.textContent = statusText || 'Tap';
    micBtn.setAttribute('aria-label', 'Tap to speak');
  } else if (state === STATE.LISTENING) {
    micBtn.classList.add('listening');
    micStatus.textContent = statusText || 'Listening...';
    micBtn.setAttribute('aria-label', 'Listening');
  } else if (state === STATE.PROCESSING) {
    micBtn.classList.add('processing');
    micStatus.textContent = statusText || 'Thinking...';
    micBtn.setAttribute('aria-label', 'Processing');
  } else if (state === STATE.SPEAKING) {
    micBtn.classList.add('speaking');
    micStatus.textContent = statusText || 'Speaking...';
    micBtn.setAttribute('aria-label', 'Speaking');
  }
}

// ---- Speech Recognition ----
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

function handleVoiceCommand(text) {
  const lower = text.toLowerCase();
  const commands = {
    'camera': /(?:switch to|show|open)\s*(?:the\s*)?camera|go to camera/,
    'map': /(?:switch to|show|open)\s*(?:the\s*)?map|go to map|where am i/,
    'history': /(?:switch to|show|open)\s*(?:the\s*)?(?:history|chat|conversation)/,
  };
  for (const [view, pattern] of Object.entries(commands)) {
    if (pattern.test(lower)) {
      switchView(view);
      speakText(`Switching to ${view} view.`);
      return true;
    }
  }
  return false;
}

function startListening() {
  if (!SpeechRecognitionAPI) {
    setState(STATE.IDLE, 'Speech not supported');
    beepError(); return;
  }
  if (!mediaStream) {
    setState(STATE.IDLE, 'Start camera first');
    beepError(); return;
  }
  if (isStreaming) return;
  stopSpeaking();
  setState(STATE.LISTENING);
  beepStart();
  recognition = new SpeechRecognitionAPI();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.continuous = false;
  recognition.maxAlternatives = 1;
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript.trim();
    if (text) {
      beepCaptured();
      if (handleVoiceCommand(text)) return;
      setState(STATE.PROCESSING);
      askQuestion(text);
    } else { setState(STATE.IDLE, 'No speech heard'); }
  };
  recognition.onerror = (e) => {
    console.warn('Speech error:', e.error);
    if (e.error === 'no-speech') setState(STATE.IDLE, 'No speech heard. Try again.');
    else if (e.error === 'aborted') { if (state === STATE.LISTENING) setState(STATE.IDLE); }
    else { beepError(); setState(STATE.IDLE, 'Speech error. Try again.'); }
  };
  recognition.onend = () => { if (state === STATE.LISTENING) setState(STATE.IDLE, 'No speech heard. Try again.'); };
  try { recognition.start(); } catch (e) { setState(STATE.IDLE, 'Speech error. Try again.'); beepError(); }
}

function stopListening() {
  if (recognition) { try { recognition.abort(); } catch (e) {} recognition = null; }
  if (state === STATE.LISTENING) setState(STATE.IDLE);
}

function stopSpeaking() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  window.speechSynthesis.cancel();
  speechQueue = []; speechActive = false;
  responseBuffer = ''; spokenIndex = 0; streamComplete = false;
  lastNavSignature = '';
  if (abortController) { abortController.abort(); abortController = null; }
  isStreaming = false;
}

// ---- Nav ----
async function captureFrame() {
  const w = video.videoWidth; const h = video.videoHeight;
  if (w === 0 || h === 0) return null;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, w, h);
  return await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.95));
}

function navSignature(detections) {
  if (!detections || !detections.length) return 'empty';
  return detections.map(d => `${d.label[0]}${Math.round(d.bbox[0]/120)}`).sort().join('');
}

function generateNavGuidance(detections, frameW) {
  if (!detections || detections.length === 0) return null;
  const left = [], center = [], right = [];
  for (const d of detections) {
    const cx = (d.bbox[0] + d.bbox[2]) / 2;
    const ratio = cx / frameW;
    const area = (d.bbox[2] - d.bbox[0]) * (d.bbox[3] - d.bbox[1]);
    const obj = { label: d.label, area };
    if (ratio < 0.33) left.push(obj);
    else if (ratio > 0.66) right.push(obj);
    else center.push(obj);
  }
  for (const arr of [left, center, right]) arr.sort((a, b) => b.area - a.area);
  const scene = [];
  if (center.length) {
    const names = [...new Set(center.map(o => o.label))];
    scene.push(names.length === 1 ? `${names[0]} ahead` : `${names.slice(0, -1).join(', ')} and ${names.slice(-1)} ahead`);
  }
  if (left.length) {
    const names = [...new Set(left.map(o => o.label))];
    scene.push(names.length === 1 ? `${names[0]} on your left` : `${names.slice(0, -1).join(', ')} and ${names.slice(-1)} on your left`);
  }
  if (right.length) {
    const names = [...new Set(right.map(o => o.label))];
    scene.push(names.length === 1 ? `${names[0]} on your right` : `${names.slice(0, -1).join(', ')} and ${names.slice(-1)} on your right`);
  }
  const desc = scene.join('. ') + '.';
  if (center.length) {
    const hasClearLeft = !left.length; const hasClearRight = !right.length;
    if (hasClearLeft && hasClearRight) return `${desc} Stop.`;
    if (hasClearLeft) return `${desc} Move left.`;
    if (hasClearRight) return `${desc} Move right.`;
    return `${desc} Move ${left[0].area > right[0].area ? 'right' : 'left'}.`;
  }
  if (left.length && right.length) return `${desc} Move straight ahead carefully.`;
  if (left.length) return `${desc} Move right.`;
  if (right.length) return `${desc} Move left.`;
  return null;
}

function runNavigation() {
  if (speechQueue.length > 0) return;
  const now = Date.now();
  if (now - lastNavTime < 8000) return;
  const w = video.videoWidth;
  if (w === 0) return;
  const sig = navSignature(smoothedDetections);
  if (sig === lastNavSignature) {
    if (now - lastNavTime > 30000 && sig === 'empty') { lastNavTime = now; speakText('Waiting for objects.'); }
    return;
  }
  lastNavSignature = sig;
  const guidance = generateNavGuidance(smoothedDetections, w);
  if (guidance) { speakText(guidance); lastNavTime = now; }
  else if (!smoothedDetections.length) { speakText('Path clear.'); lastNavTime = now; }
}

function startNavigation() {
  runNavigation();
  let lastTick = performance.now();
  function navLoop(now) {
    if (now - lastTick >= 4000) { lastTick = now; runNavigation(); }
    requestAnimationFrame(navLoop);
  }
  requestAnimationFrame(navLoop);
}

function processToken(token) {
  responseBuffer += token;
  const unspoken = responseBuffer.slice(spokenIndex);
  if (!unspoken.length) return;
  let lastBreak = -1;
  for (let i = 0; i < unspoken.length; i++) {
    if ('.!?'.includes(unspoken[i]) && (i === unspoken.length - 1 || unspoken[i + 1] === ' ')) lastBreak = i + 1;
  }
  if (lastBreak > 0) { speakText(unspoken.slice(0, lastBreak)); spokenIndex += lastBreak; }
}

function finishStream() {
  streamComplete = true;
  const remaining = responseBuffer.slice(spokenIndex);
  if (remaining.trim()) speakText(remaining);
  else if (speechQueue.length === 0) setState(STATE.IDLE);
}

// ---- Ask ----
async function askQuestion(question) {
  if (isStreaming) return;
  responseBuffer = ''; spokenIndex = 0; streamComplete = false;
  const blob = await captureFrame();
  if (!blob) { setState(STATE.IDLE, 'Camera error'); beepError(); return; }
  const formData = new FormData();
  formData.append('file', blob, 'question.jpg');
  formData.append('question', question);
  isStreaming = true;
  abortController = new AbortController();
  modelBadge.textContent = 'Model: thinking...';
  modelBadge.className = 'badge badge-yellow';
  try {
    const res = await fetch('/api/ask', { method: 'POST', body: formData, signal: abortController.signal });
    const reader = res.body.getReader();
    const decoder = new TextDecoder(); let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.done) {
              const modelUsed = data.model || '';
              const modelLabel = modelUsed.includes('ollama') ? 'Open-Source' : 'Google Vision';
              modelBadge.textContent = `Model: ${modelLabel}`;
              modelBadge.className = `badge ${modelUsed.includes('ollama') ? 'badge-blue' : 'badge-green'}`;
              addHistoryEntry(question, responseBuffer || '(empty response)');
            } else if (data.token) processToken(data.token);
          } catch (e) { console.warn('SSE parse error:', e); }
        }
      }
    }
    finishStream();
  } catch (err) {
    if (err.name === 'AbortError') return;
    console.error('Ask error:', err);
    beepError(); setState(STATE.IDLE, 'Error. Try again.');
    modelBadge.textContent = 'Model: error'; modelBadge.className = 'badge badge-red';
  }
  isStreaming = false; abortController = null;
}

// ---- Settings ----
settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsPanel.classList.toggle('open'); });
document.addEventListener('click', () => settingsPanel.classList.remove('open'));
settingsPanel.addEventListener('click', (e) => e.stopPropagation());
saveSettingsBtn.addEventListener('click', saveSettings);
testVoiceBtn.addEventListener('click', testElevenLabs);

// ---- Mic ----
micBtn.addEventListener('click', () => {
  switch (state) {
    case STATE.IDLE: startListening(); break;
    case STATE.LISTENING: stopListening(); setState(STATE.IDLE); break;
    case STATE.PROCESSING: break;
    case STATE.SPEAKING: stopSpeaking(); startListening(); break;
  }
});

micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); }, { passive: false });

// ---- Prime ----
document.addEventListener('click', () => {
  try {
    if (window.speechSynthesis) { const p = new SpeechSynthesisUtterance(' '); speechSynthesis.speak(p); speechSynthesis.cancel(); }
    const ctx = getAudioCtx(); if (ctx.state === 'suspended') ctx.resume();
  } catch (e) {}
}, { once: true });

// ---- Init ----
setState(STATE.IDLE);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) micBtn.click();
});
</script>
</body>
