<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>CANE-NAV</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="container">
    <!-- Header Panel -->
    <div class="glass-panel header-bar">
      <div class="logo">
        <span class="compass-icon">🧭</span>
        <span class="logo-text">CANE-NAV</span>
      </div>
      <div id="gps-pill" class="status-pill gps-inactive">GPS INACTIVE</div>
    </div>
    
    <!-- Navigation Controls Panel -->
    <div class="glass-panel">
      <div class="control-grid">
        <select id="start">
          <option value="">-- Start Location --</option>
          {% for key in landmarks %}
          <option value="{{ key }}">{{ key.upper() }}</option>
          {% endfor %}
        </select>

        <select id="end">
          <option value="">-- Destination --</option>
          {% for key in landmarks %}
          <option value="{{ key }}">{{ key.upper() }}</option>
          {% endfor %}
        </select>
      </div>
      
      <div class="control-row" style="margin-top: 14px; margin-bottom: 10px;">
        <span class="label">📍 Route Simulation Mode</span>
        <label class="switch">
          <input type="checkbox" id="sim-toggle" onchange="toggleSim()">
          <span class="slider"></span>
        </label>
      </div>
      
      <div class="btn-row">
        <button id="go-btn" class="nav-btn btn-go" onclick="startNav()">Start Navigation</button>
        <button id="stop-btn" class="nav-btn btn-stop" onclick="stopNav()" disabled>Stop</button>
      </div>
    </div>

    <!-- Camera Viewport Panel -->
    <div class="glass-panel" style="padding: 10px;">
      <div id="camera-container" class="camera-viewport">
        <video id="video" autoplay playsinline muted style="display:none; width:100%; height:100%; object-fit: cover;"></video>
        <canvas id="canvas" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></canvas>
        <div id="alert-banner" class="alert-overlay" style="display:none;"></div>
        <div id="avoidance-card" class="avoidance-hud" style="display:none;">
          <span id="avoidance-text"></span>
        </div>
        <div id="cam-placeholder" class="camera-placeholder">
          <span style="font-size: 3rem; margin-bottom: 8px;">📷</span>
          <span style="color: var(--text-secondary); font-size: 0.9rem;">Camera feed disabled</span>
        </div>
      </div>
      <div class="btn-row" style="margin-top: 10px; margin-bottom: 0;">
        <button id="cam-btn" class="btn-icon" onclick="toggleCamera()">📷 Enable Camera Vision</button>
        <button id="sound-btn" class="btn-icon btn-active" onclick="toggleSound()">🔊 Sound Alerts</button>
      </div>
    </div>

    <!-- Navigation Step Card -->
    <div id="step-box" class="glass-panel nav-step-panel" style="display: none;">
      <div class="step-header">
        <span id="step-num" class="step-badge">Step 1 of 5</span>
        <span id="step-dist" class="step-distance">~100m away</span>
      </div>
      <div class="step-content">
        <div class="step-icon-wrap">
          <span id="step-icon" class="step-direction-icon">⬆️</span>
        </div>
        <div id="step-text" class="step-instruction-text">Departing start point...</div>
      </div>
      <div class="progress-bar-wrap">
        <div id="progress-fill" class="progress-bar-fill" style="width: 0%;"></div>
      </div>
      <div id="progress" class="progress-summary-text">4 steps remaining</div>
    </div>

    <!-- Debug Log/Status Bar -->
    <div id="status" class="glass-panel debug-log">
      Waiting to start navigation...
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/nav.js') }}"></script>
</body>
</html>
