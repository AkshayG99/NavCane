<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>NavCane - Obstacle Guide</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0c0d12;
      color: #f5f5f7;
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 16px; }
    .card {
      background: rgba(26, 28, 38, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      font-size: 1.2rem;
    }
    .badge {
      font-size: 0.75rem;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      color: #8e8e93;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .badge.active { background: rgba(52,199,89,0.15); color: #34c759; border-color: #34c759; }
    .viewport {
      position: relative;
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: #111216;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .viewport video { width: 100%; height: 100%; object-fit: cover; }
    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: #8e8e93;
      font-size: 0.9rem;
    }
    .placeholder span:first-child { font-size: 3rem; }
    .steer-hud {
      position: absolute;
      bottom: 12px; left: 12px; right: 12px;
      padding: 14px;
      border-radius: 10px;
      background: rgba(12,13,18,0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      display: none;
    }
    .steer-hud.warning { border-color: #ff9500; box-shadow: 0 0 15px rgba(255,149,0,0.4); }
    .steer-hud.danger { border-color: #ff3b30; box-shadow: 0 0 20px rgba(255,59,48,0.6); }
    .desc-text {
      font-size: 0.85rem;
      font-weight: 400;
      color: #8e8e93;
      margin-top: 6px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      background: #0088ff;
      color: #fff;
      box-shadow: 0 0 15px rgba(0,136,255,0.4);
      transition: all 0.2s;
    }
    .btn:hover { background: #0076de; transform: translateY(-1px); }
    .btn.active { background: rgba(255,59,48,0.15); color: #ff3b30; box-shadow: none; border: 1px solid rgba(255,59,48,0.3); }
    .status { font-size: 0.8rem; color: #8e8e93; text-align: center; min-height: 20px; }
    .log {
      font-family: monospace;
      font-size: 0.78rem;
      color: #8e8e93;
      background: rgba(0,0,0,0.3);
      border-radius: 10px;
      padding: 12px;
      min-height: 80px;
      max-height: 180px;
      overflow-y: auto;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .log .time { color: #555; }
    .log .detail { color: #4da6ff; }
    .log .steer { color: #34c759; font-weight: bold; }
    .log .error { color: #ff3b30; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card header">
      <span>NavCane</span>
      <span id="status-badge" class="badge">CAMERA OFF</span>
    </div>

    <div class="card" style="padding: 10px;">
      <div class="viewport" id="viewport">
        <video id="video" autoplay playsinline muted style="display:none;"></video>
        <div id="placeholder" class="placeholder">
          <span>📷</span>
          <span>Camera off</span>
        </div>
        <div id="steer-hud" class="steer-hud">
          <div id="steer-text"></div>
          <div id="desc-text" class="desc-text"></div>
        </div>
      </div>
      <button id="cam-btn" class="btn" onclick="toggleCamera()">📷 Enable Camera</button>
    </div>

    <div id="status" class="status">Press "Enable Camera" to start obstacle guidance</div>

    <div class="card" style="padding: 12px;">
      <div style="font-size:0.75rem; font-weight:bold; color:#555; margin-bottom:6px;">GEMMA LOG</div>
      <div id="log" class="log">Waiting for camera...</div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/obstacle.js') }}"></script>
</body>
</html>
